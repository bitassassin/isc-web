<svg width="500" height="500" viewBox="0 0 500 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Infinite Scope logo v5</title>
  <desc>Scope ring with a lemniscate canted -45 degrees; the center cross is built from true line segments at 90 degrees, curving smoothly into lobes only after clearing the ring.</desc>
  <circle cx="250" cy="250" r="20" fill="none" stroke="#88EF14" stroke-width="20"/>
  <g transform="translate(250,250) rotate(-45)">
    <path d="M 210 0
             C 210 135 135 135 90 90
             L -90 -90
             C -135 -135 -210 -135 -210 0
             C -210 135 -135 135 -90 90
             L 90 -90
             C 135 -135 210 -135 210 0 Z"
          fill="none" stroke="#141414" stroke-width="20" stroke-linejoin="round"/>
  </g>
  <circle cx="250" cy="250" r="100" fill="none" stroke="#141414" stroke-width="20"/>
</svg>
